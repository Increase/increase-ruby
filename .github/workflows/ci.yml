name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1

      - name: Install dependencies
        run: bundle install

      - name: Lint
        run: ./scripts/lint

      - name: Build
        run: bundle exec rake build:gem

      - name: Test
        run: ./scripts/test
