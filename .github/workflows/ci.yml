name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    timeout-minutes: 10
    name: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run lints
        run: ./scripts/lint

      - name: Build gem
        run: bundle exec rake build:gem

      - name: Run tests
        run: ./scripts/test
